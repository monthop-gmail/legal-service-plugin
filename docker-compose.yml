services:
  # ─── ChromaDB (Vector DB — built-in) ─────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: legal-th-chromadb
    ports:
      - "8100:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    restart: unless-stopped
    networks:
      - legal-net

  # ─── Ingest Laws (run once) ──────────────────────────────
  ingest:
    build:
      context: .
      dockerfile: Dockerfile.ingest
    container_name: legal-th-ingest
    depends_on:
      - chromadb
    volumes:
      - ./laws:/app/laws:ro
      - ./scripts:/app/scripts
      - hf-cache:/root/.cache/huggingface
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - HF_TOKEN=${HF_TOKEN:-}
    command: ["python", "-u", "scripts/ingest_laws.py"]
    networks:
      - legal-net

  # ─── RAG API Service (built-in — replaces external RAG) ──
  rag-legal:
    build:
      context: .
      dockerfile: Dockerfile.rag
    container_name: legal-th-rag
    depends_on:
      - chromadb
    ports:
      - "8080:8080"
    volumes:
      - hf-cache:/root/.cache/huggingface
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - RAG_API_PORT=8080
      - HF_TOKEN=${HF_TOKEN:-}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - legal-net

  # ─── MCP Server (Legal-TH) — stdio ──────────────────────
  legal-mcp:
    build: .
    container_name: legal-th-mcp
    restart: unless-stopped
    depends_on:
      - rag-legal
    environment:
      - NODE_ENV=production
      # Odoo CRM (external)
      - ODOO_URL=${ODOO_URL:-http://odoo:8069}
      - ODOO_DB=${ODOO_DB:-legal_th}
      - ODOO_USER=${ODOO_USER:-admin}
      - ODOO_PASS=${ODOO_PASS:-admin}
      # RAG (built-in ChromaDB)
      - RAG_URL=http://rag-legal:8080
      - RAG_API_KEY=${RAG_API_KEY:-}
    stdin_open: true
    networks:
      - legal-net

  # ─── HTTP Transport (Streamable HTTP + SSE) ─────────────
  legal-mcp-http:
    build: .
    container_name: legal-th-mcp-http
    restart: unless-stopped
    command: ["node", "dist/http-server.js"]
    depends_on:
      - rag-legal
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - MCP_HTTP_PORT=3001
      # Odoo CRM (external)
      - ODOO_URL=${ODOO_URL:-http://odoo:8069}
      - ODOO_DB=${ODOO_DB:-legal_th}
      - ODOO_USER=${ODOO_USER:-admin}
      - ODOO_PASS=${ODOO_PASS:-admin}
      # RAG (built-in ChromaDB)
      - RAG_URL=http://rag-legal:8080
      - RAG_API_KEY=${RAG_API_KEY:-}
    networks:
      - legal-net

  # ─── Odoo CRM (external — optional) ─────────────────────
  odoo:
    image: odoo:17.0
    container_name: legal-th-odoo
    depends_on:
      - odoo-db
    ports:
      - "8069:8069"
    environment:
      - HOST=odoo-db
      - USER=odoo
      - PASSWORD=${ODOO_DB_PASS:-odoo}
    volumes:
      - odoo-data:/var/lib/odoo
      - odoo-addons:/mnt/extra-addons
    networks:
      - legal-net
    profiles:
      - with-odoo

  odoo-db:
    image: postgres:16-alpine
    container_name: legal-th-postgres
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=${ODOO_DB_PASS:-odoo}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - legal-net
    profiles:
      - with-odoo

volumes:
  chroma-data:
  hf-cache:
  odoo-data:
  odoo-addons:
  pg-data:

networks:
  legal-net:
    driver: bridge
